<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro - Storm Mode</title>

<meta name="theme-color" content="#001a2a">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#000a14;
    color:white;
}

nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:10px;
    background:rgba(0,20,35,0.75);
    border-bottom:1px solid rgba(0,170,255,0.25);
}

nav a{
    color:#00d9ff;
    text-decoration:none;
    font-weight:bold;
    padding:8px 12px;
    border-radius:10px;
}

header{
    text-align:center;
    padding:12px;
    background:rgba(0,30,40,0.7);
}

#roomScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    z-index:999;
}

#roomScreen input{
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#001a2a;
    color:white;
    text-align:center;
}

#roomScreen button{
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00aaff,#00ffaa);
}

#chat{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
}

.msg{
    background:linear-gradient(145deg,#001a2a,#002b3a,#001018);
    padding:12px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(0,170,255,0.25);
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(0,20,30,0.75);
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    background:#001a2a;
    color:white;
}

#name{ width:90px; }
#message{ flex:1; }

button{
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00aaff,#00ffaa);
}
</style>

</head>

<body>

<nav>
<a href="music.html">Music</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
</nav>

<header id="roomTitle">💀 Legend Chat Pro 💀 | 👥 Online: 0</header>

<!-- ROOM SCREEN -->
<div id="roomScreen">
    <h2>💀 Enter The Legend Room</h2>
    <input id="nameInput" placeholder="Your Name">
    <button onclick="joinLobby()">Enter Lobby</button>
</div>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  set,
  onDisconnect,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyByZRmp6R9HY17T2_WdJUFWeeaLNOP6y2Y",
  authDomain: "horr-a08f4.firebaseapp.com",
  databaseURL: "https://horr-a08f4-default-rtdb.firebaseio.com",
  projectId: "horr-a08f4",
  storageBucket: "horr-a08f4.firebasestorage.app",
  messagingSenderId: "933810617818",
  appId: "1:933810617818:web:efb24f123337dd987c14e3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let chatRef = null;
let presenceRef = null;
let currentRoom = "LOBBY";
let userId = Math.random().toString(36).substring(2, 10);

/* JOIN */
window.joinLobby = function(){
    const name = document.getElementById("nameInput").value || "Ghost";
    enterRoom("LOBBY", name);
};

function enterRoom(room, name){
    currentRoom = room;

    document.getElementById("roomScreen").style.display = "none";
    document.getElementById("name").value = name;

    document.getElementById("chat").innerHTML = "Loading...";

    chatRef = ref(db, "rooms/" + room + "/messages");

    setupPresence(room, name);
    listenMessages();
    autoDeleteOldMessages();
}

/* 👥 ONLINE */
function setupPresence(room, name){
    presenceRef = ref(db, "rooms/" + room + "/presence/" + userId);

    set(presenceRef, { name, online: true });
    onDisconnect(presenceRef).remove();

    const allPresence = ref(db, "rooms/" + room + "/presence");

    onValue(allPresence, (snap)=>{
        const data = snap.val() || {};
        const count = Object.keys(data).length;

        document.getElementById("roomTitle").innerText =
            "💀 Room: " + room + " | 👥 Online: " + count;
    });
}

/* 💬 MESSAGES */
function listenMessages(){
    if(!chatRef) return;

    const chatBox = document.getElementById("chat");
    chatBox.innerHTML = "";

    onChildAdded(chatRef, (snap)=>{
        const d = snap.val();
        if(!d) return;

        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${d.name || "Ghost"}</b><br>${d.message || ""}`;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

/* 💬 SEND (TEXT ONLY) */
window.sendMessage = function(){
    if(!chatRef) return;

    const name = document.getElementById("name").value || "Ghost";
    const message = document.getElementById("message").value;

    if(!message.trim()) return;

    // 🚫 block image links
    if(message.match(/\.(jpg|jpeg|png|gif|webp)$/i)){
        alert("Text only chat. No images allowed.");
        return;
    }

    push(chatRef, {
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value = "";
};

/* ⏳ AUTO DELETE AFTER 20 MIN */
function autoDeleteOldMessages(){
    const roomRef = ref(db, "rooms/" + currentRoom + "/messages");

    setInterval(() => {
        onValue(roomRef, (snap)=>{
            const data = snap.val() || {};

            Object.entries(data).forEach(([key, msg])=>{
                if(!msg.time) return;

                const age = Date.now() - msg.time;

                // ⏳ 20 minutes = 1,200,000 ms
                if(age > 20 * 60 * 1000){
                    remove(ref(db, "rooms/" + currentRoom + "/messages/" + key));
                }
            });
        }, { onlyOnce: true });
    }, 30000);
}
</script>

</body>
</html>
