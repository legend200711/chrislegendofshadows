<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro</title>

<meta name="theme-color" content="#001a2a">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    color:white;
    background:#000814;
}

/* 🌧️ BLUE RAIN BACKGROUND */
body{
    background: linear-gradient(180deg,#001a33,#000814,#000);
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      repeating-linear-gradient(
        180deg,
        rgba(0,150,255,0.15) 0px,
        rgba(0,150,255,0.15) 1px,
        transparent 1px,
        transparent 8px
      );
    animation: rain 0.4s linear infinite;
    pointer-events:none;
    opacity:0.4;
}

@keyframes rain{
    from{ transform:translateY(0); }
    to{ transform:translateY(8px); }
}

/* HEADER */
header{
    text-align:center;
    padding:14px;
    font-weight:bold;
    background:rgba(0,30,60,0.7);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(0,140,255,0.6);
    text-shadow:0 0 10px #00aaff;
}

/* NAV */
.pop-nav{
    display:flex;
    justify-content:center;
    gap:14px;
    padding:12px;
    margin:10px auto;
    background:rgba(0, 140, 255, 0.15);
    border:1px solid rgba(0, 180, 255, 0.6);
    border-radius:14px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 18px rgba(0, 170, 255, 0.4);
    width:fit-content;
}

.pop-nav a{
    color:#00c3ff;
    text-decoration:none;
    font-weight:bold;
    padding:6px 12px;
    border-radius:10px;
    transition:0.2s;
}

.pop-nav a:hover{
    background:rgba(0, 195, 255, 0.2);
    transform:scale(1.1);
}

/* CHAT */
#chat{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
}

/* MESSAGE */
.msg{
    background:rgba(0,20,40,0.8);
    padding:12px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(0,150,255,0.4);
}

/* INPUT BAR */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(0,10,25,0.8);
    backdrop-filter:blur(14px);
    border-top:1px solid rgba(0,140,255,0.5);
}

input{
    border:none;
    padding:12px;
    border-radius:10px;
    outline:none;
    background:#001a33;
    color:white;
}

#name{ width:90px; }
#message{ flex:1; }

button{
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#0077ff,#00c3ff);
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<header>💙 Legend Chat Pro 💙</header>

<nav class="pop-nav">
    <a href="music.html">music</a>
    <a href="about.html">About</a>
    <a href="gallery.html">gallery</a>
</nav>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyAOnAtWjIx-L5suOt6_26eAbgf3k4ggmb4",
  authDomain: "legend-chat-246fd.firebaseapp.com",
  databaseURL: "https://legend-chat-246fd-default-rtdb.firebaseio.com",
  projectId: "legend-chat-246fd",
  storageBucket: "legend-chat-246fd.firebasestorage.app",
  messagingSenderId: "365662264136",
  appId: "1:365662264136:web:5a8cbc749e5ba1bca1f17d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");

/* 🔥 SESSION START (KEY FIX) */
const sessionStart = Date.now();

/* SEND MESSAGE */
window.sendMessage = function(){
    const name = document.getElementById("name").value || "Ghost";
    const message = document.getElementById("message").value;

    if(!message.trim()) return;

    push(chatRef,{
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value="";
};

/* RECEIVE MESSAGES */
onChildAdded(chatRef, (snap)=>{
    const d = snap.val();

    /* 🚫 IGNORE OLD MESSAGES FROM BEFORE YOU ENTERED */
    if(d.time < sessionStart) return;

    const div = document.createElement("div");
    div.className="msg";
    div.innerHTML = `<b>${d.name}</b><br>${d.message}`;

    const chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
