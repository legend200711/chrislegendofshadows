<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blue Flame Community Chat</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#000;
color:#cfefff;
}

body{
background: radial-gradient(circle at center,#031a33 0%,#000 75%);
}

/* ===== BLUE RAIN ===== */

.rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
overflow:hidden;
}

.drop{
position:absolute;
width:2px;
height:90px;
background:linear-gradient(to bottom,transparent,rgba(100,200,255,.95));
animation:rain linear infinite;
}

@keyframes rain{
from{transform:translateY(-120px);}
to{transform:translateY(110vh) translateX(-80px);}
}

/* ===== BLUE FLAMES ===== */

.flames{
position:fixed;
bottom:0;
left:0;
width:100%;
height:200px;
pointer-events:none;
z-index:2;
overflow:hidden;
}

.flame{
position:absolute;
bottom:-40px;
width:60px;
height:120px;
border-radius:50%;
filter:blur(14px);

background:radial-gradient(
ellipse at center,
rgba(180,240,255,.95) 0%,
rgba(0,170,255,.85) 40%,
rgba(0,80,255,.4) 70%,
transparent 90%
);

animation:flicker 3s infinite ease-in-out;
}

@keyframes flicker{
0%,100%{transform:scaleY(1);opacity:.85;}
50%{transform:scaleY(1.4) translateY(-20px);opacity:1;}
}

/* ===== CHAT BOX ===== */

.chat-box{
position:relative;
z-index:10;

width:95%;
max-width:1200px;
height:92vh;

margin:2vh auto;

display:flex;
flex-direction:column;

background:rgba(0,15,35,.55);
backdrop-filter:blur(18px);

border:2px solid rgba(0,220,255,.8);
border-radius:30px;

box-shadow:
0 0 30px rgba(0,180,255,.8),
0 0 60px rgba(0,120,255,.6),
0 0 120px rgba(0,80,255,.4),
inset 0 0 40px rgba(0,120,255,.25);

overflow:hidden;

animation:floatBox 6s ease-in-out infinite;
}

/* ===== HEADER ===== */

.header{
padding:22px;
text-align:center;
font-size:34px;
font-weight:bold;
letter-spacing:4px;

background:rgba(0,0,0,.45);

text-shadow:
0 0 10px #00aaff,
0 0 20px #00aaff,
0 0 40px #33ccff,
0 0 80px #66ddff;

animation:titlePulse 3s infinite;
}

/* ===== NAVIGATION ===== */

nav{
display:flex;
justify-content:center;
gap:25px;

padding:15px 0;

background:rgba(0,0,0,.35);

border-top:1px solid rgba(0,180,255,.25);
border-bottom:1px solid rgba(0,180,255,.25);

box-shadow:
0 0 20px rgba(0,120,255,.3),
inset 0 0 15px rgba(0,120,255,.2);
}

nav a{
color:#cfefff;
text-decoration:none;
font-size:18px;
font-weight:bold;

padding:10px 22px;

border:1px solid rgba(0,180,255,.35);
border-radius:30px;

background:rgba(0,80,150,.15);

text-shadow:0 0 8px #00aaff;

box-shadow:0 0 10px rgba(0,120,255,.3);

transition:.3s;
}

nav a:hover{
transform:translateY(-3px) scale(1.08);
color:#fff;

background:rgba(0,140,255,.25);

box-shadow:
0 0 15px rgba(0,180,255,.8),
0 0 30px rgba(0,100,255,.6);

text-shadow:0 0 10px #fff,0 0 20px #66ddff;
}

/* ===== CHAT CONTAINER ===== */

.chat-container{
flex:1;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container iframe{
width:100%;
height:100%;
min-height:600px;

border:none;
border-radius:25px;

box-shadow:
0 0 25px rgba(0,180,255,.9),
0 0 60px rgba(0,120,255,.6),
0 0 120px rgba(0,80,255,.4),
inset 0 0 30px rgba(100,220,255,.3);

animation:chatGlow 4s ease-in-out infinite;
}

/* ===== ANIMATIONS ===== */

@keyframes chatGlow{
0%,100%{transform:scale(1);}
50%{transform:scale(1.01);}
}

@keyframes titlePulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}

@keyframes floatBox{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
/* =========================
   RESPONSIVE AUTO-FIT
   ========================= */

html,body{
width:100%;
height:100%;
overflow:hidden;
}

/* Tablets */
@media (max-width:900px){

h1{
font-size:34px;
letter-spacing:4px;
margin-top:40px;
}

#core{
width:150px;
height:150px;
}

.portal{
width:120px;
height:120px;
font-size:14px;
}

#aboutNode{transform:rotate(0deg) translateX(200px);}
#galleryNode{transform:rotate(90deg) translateX(200px);}
#musicNode{transform:rotate(180deg) translateX(200px);}
#chatNode{transform:rotate(270deg) translateX(200px);}
}

/* Phones */
@media (max-width:600px){

h1{
font-size:22px;
letter-spacing:2px;
margin-top:20px;
padding:0 10px;
}

#core{
width:110px;
height:110px;
}

.portal{
width:85px;
height:85px;
font-size:11px;
letter-spacing:1px;
}

#aboutNode{transform:rotate(0deg) translateX(130px);}
#galleryNode{transform:rotate(90deg) translateX(130px);}
#musicNode{transform:rotate(180deg) translateX(130px);}
#chatNode{transform:rotate(270deg) translateX(130px);}
}
</style>
</head>

<body>

<!-- BLUE RAIN -->
<div class="rain" id="rain"></div>

<!-- BLUE FLAMES -->
<div class="flames" id="flames"></div>

<div class="chat-box">

<div class="header">
💙 COMMUNITY CHAT 💙
</div>

<nav>
<a href="music.html">Music</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
</nav>

<div class="chat-container">

<iframe src="https://deadsimplechat.com/y1EOehO-D" allowfullscreen></iframe>

</div>

</div>

<script>

/* RAIN */
const rain=document.getElementById("rain");

for(let i=0;i<200;i++){
const d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(0.5+Math.random()*0.8)+"s";
d.style.opacity=Math.random();
rain.appendChild(d);
}

/* FLAMES */
const flames=document.getElementById("flames");

for(let i=0;i<30;i++){
const f=document.createElement("div");
f.className="flame";
f.style.left=(i*3.5)+"%";
f.style.height=(90+Math.random()*120)+"px";
f.style.animationDelay=Math.random()*3+"s";
flames.appendChild(f);
}

</script>

</body>
</html>
