<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legend Gallery</title>

<style>

/* ===== GLOBAL FIX ===== */
*{
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
overflow-x:hidden;
}

body{
margin:0;
background:#000;
color:#cfefff;
font-family:Arial,sans-serif;
overflow-x:hidden;
width:100%;
}

/* ===== MOBILE FIT FIX ===== */
@media (max-width: 768px){

body{
padding-bottom:40px;
}

/* remove layout overflow */
.container{
margin:70px 10px;
padding:10px;
}

/* NAV FIX */
nav{
flex-wrap:wrap;
gap:8px;
padding:10px;
font-size:13px;
}

/* HEADER FIX */
header{
padding:70px 10px 10px;
}

h1{
font-size:22px;
text-align:center;
}

p{
text-align:center;
font-size:14px;
}

/* GALLERY FIX */
.gallery{
grid-template-columns:1fr;
gap:12px;
padding:10px;
}

.gallery img{
width:100%;
height:auto;
max-height:260px;
object-fit:cover;
}

/* FLAME CANVAS SAFE */
#flameCanvas{
width:100vw;
height:100vh;
}

/* INTRO TEXT */
.logo{
font-size:26px;
text-align:center;
padding:0 10px;
}

/* hide cursor effect safely */
#cursor{
display:none;
}
}

/* ===== CINEMATIC BACKGROUND ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.25),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.18),transparent 45%);
z-index:-10;
animation:bgPulse 6s infinite alternate;
}

@keyframes bgPulse{
0%{filter:brightness(1)}
100%{filter:brightness(1.5)}
}

/* FLAMES */
#flameCanvas{
position:fixed;
inset:0;
z-index:-8;
pointer-events:none;
}

/* LIGHTNING */
.lightning{
position:fixed;
inset:0;
z-index:-7;
background:white;
opacity:0;
pointer-events:none;
animation:lightningFlash 6s infinite;
}

/* INTRO */
.intro-overlay{
position:fixed;
inset:0;
z-index:200;
display:flex;
align-items:center;
justify-content:center;
background:#000;
animation:fadeOutIntro 4.5s forwards;
}

.logo{
font-size:48px;
color:#cfefff;
text-shadow:0 0 10px #00aaff,0 0 30px #0077ff;
animation:logoReveal 4.5s ease forwards;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
z-index:99;
flex-wrap:wrap;
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

/* HEADER */
header{
text-align:center;
padding:80px 20px 20px;
}

/* GALLERY */
.gallery{
max-width:1100px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:14px;
}

/* animations kept same */
</style>
</head>

<body>

<canvas id="flameCanvas"></canvas>
<div class="lightning"></div>

<div class="intro-overlay" id="intro">
  <div class="logo">Chris Legend of Shadows</div>
</div>

<nav>
<a href="music.html">Music</a>
<a href="about.html">About</a>
<a href="chat room.html">chat room</a>
</nav>

<header>
<h1>🔥 Chris Legend of Shadows Gallery</h1>
<p>All your visuals, memories, and world building.</p>
</header>

<div class="gallery">
<img src="samiam.png">
<img src="tam.png">
</div>

<script>
setTimeout(() => {
  const intro = document.getElementById("intro");
  if (intro) intro.style.display = "none";
}, 4700);

const canvas = document.getElementById("flameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Flame{
constructor(){ this.reset(); }
reset(){
this.x=Math.random()*canvas.width;
this.y=canvas.height+50;
this.size=Math.random()*6+2;
this.speedY=Math.random()*2+1;
this.speedX=(Math.random()-0.5)*1.5;
this.life=120;
this.alpha=0.4;
}
update(){
this.y-=this.speedY;
this.x+=this.speedX;
this.life--;
if(this.life<=0) this.reset();
}
draw(){
const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2);
g.addColorStop(0,"rgba(0,180,255,.5)");
g.addColorStop(1,"transparent");
ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
ctx.fill();
}
}

const flames=[];
for(let i=0;i<120;i++) flames.push(new Flame());

function animate(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);
flames.forEach(f=>{f.update();f.draw();});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
