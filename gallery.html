<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legend Gallery + Storm Mode</title>

<style>

/* ================= BASE ================= */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow-x:hidden;
font-family:Arial,sans-serif;
color:#cfefff;
}

/* ================= CANVAS ================= */
#rainCanvas, #flameCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
}

#rainCanvas{ z-index:1; }
#flameCanvas{ z-index:2; }

/* LIGHTNING FLASH */
#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:5;
pointer-events:none;
mix-blend-mode:overlay;
transition:opacity 0.15s ease;
}

/* CONTENT ABOVE */
nav, .gallery, .comments-section{
position:relative;
z-index:10;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

/* GALLERY */
.gallery{
max-width:1100px;
margin:120px auto 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:14px;
border:1px solid rgba(0,200,255,.25);
}

/* COMMENTS */
.comments-section{
max-width:600px;
margin:40px auto;
background:#111f33;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#0b2a44;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:10px;
background:#00c3ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.comment{
margin-top:10px;
padding:10px;
background:#0b2a44;
border-left:3px solid #00c3ff;
}

</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<canvas id="flameCanvas"></canvas>
<div id="flash"></div>

<nav>
<a href="music.html">music</a>
<a href="about.html">About</a>
<a href="chat room.html">chat room</a>
</nav>

<div class="gallery">
<img src="samiam.png">
<img src="tam.png">
</div>

<div class="comments-section">
<h2 style="text-align:center;color:#00c3ff;">💬 Global Comments</h2>

<input id="name" placeholder="Your name">
<textarea id="message" placeholder="Write a comment..."></textarea>
<button onclick="addComment()">Post</button>

<div id="comments"></div>
</div>

<script>

/* ================= CANVAS ================= */
const rainCanvas = document.getElementById("rainCanvas");
const rctx = rainCanvas.getContext("2d");

const flameCanvas = document.getElementById("flameCanvas");
const fctx = flameCanvas.getContext("2d");

const flash = document.getElementById("flash");

function resize(){
rainCanvas.width = window.innerWidth;
rainCanvas.height = window.innerHeight;
flameCanvas.width = window.innerWidth;
flameCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ================= LIGHTNING ================= */
function lightning(){
flash.style.opacity = "1";
setTimeout(()=> flash.style.opacity = "0.25", 120);
setTimeout(()=> flash.style.opacity = "0", 250);
}

function lightningLoop(){
setTimeout(()=>{
lightning();
lightningLoop();
}, 2500 + Math.random()*6000);
}
lightningLoop();

/* ================= WIND ================= */
let wind = -2;

setInterval(()=>{
wind = -4 + Math.random()*8;
}, 3000);

/* ================= BLUE RAIN (FIXED ENDLESS LOOP) ================= */
class Rain{
constructor(){
this.reset();
}

reset(){
this.x = Math.random()*rainCanvas.width;
this.y = Math.random()*rainCanvas.height;
this.len = 30 + Math.random()*40;
this.speed = 12 + Math.random()*10;
}

update(){
this.x += wind;
this.y += this.speed;

/* 🌧️ smooth infinite loop (NO flicker) */
if(this.y > rainCanvas.height){
this.y = -this.len;
this.x = Math.random()*rainCanvas.width;
}
}

draw(){
rctx.strokeStyle = "rgba(0,220,255,1)";
rctx.lineWidth = 2.3;

rctx.shadowBlur = 18;
rctx.shadowColor = "rgba(0,220,255,0.9)";

rctx.beginPath();
rctx.moveTo(this.x,this.y);
rctx.lineTo(this.x + wind*3, this.y + this.len);
rctx.stroke();

rctx.shadowBlur = 0;
}
}

/* ================= ENERGY PARTICLES ================= */
class Flame{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*flameCanvas.width;
this.y = flameCanvas.height + Math.random()*100;
this.size = Math.random()*6 + 2;
this.speedY = Math.random()*2 + 1;
this.speedX = (Math.random()-0.5)*2;
this.life = Math.random()*140;
this.alpha = Math.random()*0.7 + 0.2;
}

update(){
this.y -= this.speedY;
this.x += this.speedX + wind*0.2;
this.life--;

if(this.life<=0 || this.y<-50) this.reset();
}

draw(){
const g = fctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2);
g.addColorStop(0, `rgba(0,200,255,${this.alpha})`);
g.addColorStop(1,"rgba(0,0,0,0)");

fctx.fillStyle = g;
fctx.beginPath();
fctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
fctx.fill();
}
}

const rain = Array.from({length:350}, ()=>new Rain());
const flames = Array.from({length:140}, ()=>new Flame());

/* ================= ANIMATE ================= */
function animate(){

rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);

/* fog trail */
fctx.fillStyle = "rgba(0,0,0,0.14)";
fctx.fillRect(0,0,flameCanvas.width,flameCanvas.height);

rain.forEach(r=>{ r.update(); r.draw(); });
flames.forEach(f=>{ f.update(); f.draw(); });

requestAnimationFrame(animate);
}
animate();

/* ================= COMMENTS ================= */
window.addComment = function(){
const name = document.getElementById("name").value;
const message = document.getElementById("message").value;
if(!name || !message) return;

const div = document.createElement("div");
div.className = "comment";
div.innerHTML = `<b>${name}</b><br>${message}`;

document.getElementById("comments").prepend(div);

document.getElementById("message").value = "";
};

</script>

</body>
</html>
