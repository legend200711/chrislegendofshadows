<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legend Gallery + Comments</title>

<style>

/* ================= GLOBAL ================= */
html, body{
width:100%;
height:100%;
margin:0;
overflow-x:hidden;
font-family:Arial,sans-serif;
background:#000;
color:#cfefff;
}

/* ================= BACKGROUND ================= */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.25),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.18),transparent 45%);
z-index:-10;
animation:bgPulse 6s infinite alternate;
}

@keyframes bgPulse{
0%{filter:brightness(1)}
100%{filter:brightness(1.5)}
}

/* ================= FLAMES ================= */
#flameCanvas{
position:fixed;
inset:0;
z-index:-8;
pointer-events:none;
}

/* ================= LIGHTNING ================= */
.lightning{
position:fixed;
inset:0;
z-index:-7;
background:white;
opacity:0;
pointer-events:none;
animation:lightningFlash 6s infinite;
}

@keyframes lightningFlash{
0%,92%,100%{opacity:0}
93%{opacity:0.8}
94%{opacity:0}
96%{opacity:1}
97%{opacity:0}
}

/* ================= INTRO ================= */
.intro-overlay{
position:fixed;
inset:0;
z-index:200;
display:flex;
align-items:center;
justify-content:center;
background:#000;
animation:fadeOutIntro 4.5s forwards;
}

.logo{
font-size:48px;
text-align:center;
color:#cfefff;
text-shadow:0 0 10px #00aaff,0 0 30px #0077ff,0 0 60px #0033ff;
animation:logoReveal 4.5s ease forwards;
}

@keyframes logoReveal{
0%{opacity:0; transform:scale(0.5)}
25%{opacity:1; transform:scale(1.1)}
100%{opacity:1}
}

@keyframes fadeOutIntro{
80%{opacity:1}
100%{opacity:0; visibility:hidden}
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
z-index:99;
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

/* ================= GALLERY (NEW VERSION ADDED) ================= */
.gallery{
max-width:1100px;
margin:120px auto 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
box-sizing:border-box;
align-items:start;
}

/* 🔥 AUTO-FIT ALL IMAGES */
.gallery img{
display:block;
width:100%;
max-width:100%;
height:auto;
object-fit:contain;
background:#07111d;
padding:8px;
border-radius:14px;
border:1px solid rgba(0,200,255,.25);
box-shadow:
0 0 15px rgba(0,170,255,.25),
0 0 30px rgba(0,80,255,.15);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
box-shadow:
0 0 25px rgba(0,200,255,.5),
0 0 50px rgba(0,100,255,.3);
}

/* 📱 MOBILE FIT */
@media (max-width:768px){

.gallery{
grid-template-columns:1fr;
padding:12px;
gap:16px;
}

.gallery img{
width:100%;
height:auto;
max-height:70vh;
object-fit:contain;
}
}

/* ================= COMMENTS ================= */
.comments-section{
max-width:600px;
margin:40px auto;
background:#111f33;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#0b2a44;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:10px;
background:#00c3ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.comment{
margin-top:10px;
padding:10px;
background:#0b2a44;
border-left:3px solid #00c3ff;
border-radius:8px;
}

/* ================= CANVAS ================= */
#flameCanvas{
position:fixed;
inset:0;
z-index:-8;
}
</style>
</head>

<body>

<canvas id="flameCanvas"></canvas>
<div class="lightning"></div>

<!-- INTRO -->
<div class="intro-overlay" id="intro">
<div class="logo">Chris Legend of Shadows</div>
</div>

<!-- NAV -->
<nav>
<a href="#">Home</a>
<a href="#">Music</a>
<a href="#">Gallery</a>
<a href="#">Chat</a>
</nav>

<!-- GALLERY -->
<div class="gallery">
<img src="samiam.png">
<img src="tam.png">
</div>

<!-- COMMENTS -->
<div class="comments-section">
<h2 style="text-align:center;color:#00c3ff;">💬 Global Comments</h2>

<input id="name" placeholder="Your name">
<textarea id="message" placeholder="Write a comment..."></textarea>
<button onclick="addComment()">Post</button>

<div id="comments"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDSxO8uyyEwWSIDW-y0-ngWrCPytzA4XmA",
authDomain: "legend-4af26.firebaseapp.com",
databaseURL: "https://legend-4af26-default-rtdb.firebaseio.com",
projectId: "legend-4af26",
storageBucket: "legend-4af26.firebasestorage.app",
messagingSenderId: "128882062099",
appId: "1:128882062099:web:3fd0f76f80fbea137620e6",
measurementId: "G-Q5X2MDBBH1"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getDatabase(app);

const commentsRef = ref(db, "comments");

window.addComment = function(){
const name = document.getElementById("name").value;
const message = document.getElementById("message").value;

if(!name.trim() || !message.trim()) return;

push(commentsRef,{
name,
message,
time: Date.now()
});

document.getElementById("message").value="";
};

onValue(commentsRef,(snapshot)=>{
const data = snapshot.val();
const box = document.getElementById("comments");
box.innerHTML="";

if(!data) return;

Object.values(data).forEach(c=>{
box.innerHTML += `
<div class="comment">
<b>${c.name}</b><br>
${c.message}
</div>`;
});
});
</script>

<!-- FLAMES -->
<script>
const canvas = document.getElementById("flameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Flame{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*canvas.width;
this.y = canvas.height + Math.random()*100;
this.size = Math.random()*6 + 2;
this.speedY = Math.random()*2 + 1;
this.speedX = (Math.random()-0.5)*1.5;
this.alpha = Math.random()*0.6 + 0.2;
this.life = Math.random()*120;
}

update(){
this.y -= this.speedY;
this.x += this.speedX;
this.life--;
if(this.life<=0 || this.y<-50) this.reset();
}

draw(){
const g = ctx.createRadialGradient(
this.x,this.y,0,
this.x,this.y,this.size*2
);

g.addColorStop(0, `rgba(0,180,255,${this.alpha})`);
g.addColorStop(0.4, `rgba(0,120,255,${this.alpha*0.6})`);
g.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle = g;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
ctx.fill();
}
}

const flames=[];
for(let i=0;i<140;i++) flames.push(new Flame());

function animate(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

flames.forEach(f=>{
f.update();
f.draw();
});

requestAnimationFrame(animate);
}
animate();

/* INTRO REMOVE */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},4700);
</script>

</body>
</html>
