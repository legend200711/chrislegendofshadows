<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Legend Gallery</title>

<style>
html{scroll-behavior:smooth}

body{
margin:0;
background:#000;
color:#cfefff;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* ===== CINEMATIC BACKGROUND ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.25),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.18),transparent 45%);
z-index:-10;
animation:bgPulse 6s infinite alternate;
}

@keyframes bgPulse{
0%{filter:brightness(1)}
100%{filter:brightness(1.5)}
}

/* ===== FLAMES ===== */
#flameCanvas{
position:fixed;
inset:0;
z-index:-8;
pointer-events:none;
}

/* ===== LIGHTNING ===== */
.lightning{
position:fixed;
inset:0;
z-index:-7;
background:white;
opacity:0;
pointer-events:none;
animation:lightningFlash 6s infinite;
}

@keyframes lightningFlash{
0%,92%,100%{opacity:0}
93%{opacity:0.8}
94%{opacity:0}
96%{opacity:1}
97%{opacity:0}
}

/* ===== INTRO OVERLAY ===== */
.intro-overlay{
position:fixed;
inset:0;
z-index:200;
display:flex;
align-items:center;
justify-content:center;
background:#000;
overflow:hidden;
animation:fadeOutIntro 4.5s forwards;
}

.lightning-burst{
position:absolute;
inset:0;
background:white;
opacity:0;
animation:lightningStrike 4.5s ease-in-out;
}

.logo{
font-size:48px;
color:#cfefff;
text-shadow:
0 0 10px #00aaff,
0 0 30px #0077ff,
0 0 60px #0033ff;
opacity:0;
transform:scale(0.6);
animation:logoReveal 4.5s ease forwards;
}

/* ===== INTRO ANIMATIONS ===== */
@keyframes lightningStrike{
0%{opacity:0}
18%{opacity:0}
20%{opacity:1}
22%{opacity:0}
40%{opacity:0}
42%{opacity:1}
44%{opacity:0}
100%{opacity:0}
}

@keyframes logoReveal{
0%{opacity:0; transform:scale(0.5) translateY(30px)}
20%{opacity:0}
25%{opacity:1; transform:scale(1.1)}
35%{transform:scale(1)}
100%{opacity:1}
}

@keyframes fadeOutIntro{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0; visibility:hidden}
}

/* HEADER */
header{
text-align:center;
padding:80px 20px 20px;
}

h1{
font-size:40px;
text-shadow:0 0 25px #00c8ff;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(0,200,255,.2);
z-index:99;
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00e5ff;
}

/* GALLERY */
.gallery{
max-width:1100px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:14px;
border:1px solid rgba(0,200,255,.25);
box-shadow:0 0 20px rgba(0,200,255,.15);
transition:.3s ease;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(0,200,255,.4);
}
</style>
</head>

<body>

<!-- 🔥 FLAMES -->
<canvas id="flameCanvas"></canvas>

<!-- ⚡ LIGHTNING BACKGROUND -->
<div class="lightning"></div>

<!-- ⚡ INTRO LOGO REVEAL -->
<div class="intro-overlay" id="intro">
  <div class="lightning-burst"></div>
  <div class="logo"> Chris Legend of Shadows</div>
</div>

<nav>
<a href="music.html">Music</a>
  <a href="about.html">About</a>
    <a href="chat room.html">chat room</a>
</nav>

<header>
<h1>🔥 Chris Legend of Shadows Gallery</h1>
<p>All your visuals, memories, and world building.</p>
</header>

<div class="gallery">
<img src="samiam.png" style="width:100%; height:auto;">
<img src="tam.png" style="width:100%; height:auto;">
</div>

<script>
/* ===== AUTO REMOVE INTRO ===== */
setTimeout(() => {
  const intro = document.getElementById("intro");
  if (intro) intro.style.display = "none";
}, 4700);

/* ===== FLAME PARTICLES ===== */
const canvas = document.getElementById("flameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Flame{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*canvas.width;
this.y = canvas.height + Math.random()*100;
this.size = Math.random()*6 + 2;
this.speedY = Math.random()*2 + 1;
this.speedX = (Math.random()-0.5)*1.5;
this.alpha = Math.random()*0.6 + 0.2;
this.life = Math.random()*120;
}

update(){
this.y -= this.speedY;
this.x += this.speedX;
this.life--;
this.alpha += (Math.random()-0.5)*0.1;

if(this.life<=0 || this.y<-50){
this.reset();
}
}

draw(){
const g = ctx.createRadialGradient(
this.x,this.y,0,
this.x,this.y,this.size*2
);

g.addColorStop(0,`rgba(0,180,255,${this.alpha})`);
g.addColorStop(0.4,`rgba(0,120,255,${this.alpha*0.6})`);
g.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
ctx.fill();
}
}

const flames=[];
for(let i=0;i<140;i++) flames.push(new Flame());

function animate(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

flames.forEach(f=>{
f.update();
f.draw();
});

requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
