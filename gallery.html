<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chris Legend of Shadows System</title>

<style>
html, body{
margin:0;
padding:0;
width:100%;
min-height:100%;
overflow-x:hidden;
font-family:Arial,sans-serif;
color:#cfefff;
background: radial-gradient(circle at top, #050b18, #000);
position:relative;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
z-index:0;
pointer-events:none;
}

/* ===== STORM CANVAS ===== */
#flameCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
z-index:1;
}

/* ===== BLUE RAIN ===== */
.rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:2;
overflow:hidden;
}

.drop{
position:absolute;
bottom:100%;
width:2px;
height:90px;
background:linear-gradient(to bottom, transparent, #00aaff);
animation:fall linear infinite;
opacity:0.5;
}

@keyframes fall{
to{ transform:translateY(120vh); }
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.5);
backdrop-filter:blur(10px);
z-index:10;
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
padding:8px 14px;
border-radius:20px;
}

nav a:hover{
background:#00aaff;
color:black;
box-shadow:0 0 15px #00aaff;
}

/* MAIN */
.container{
max-width:800px;
margin:100px auto 40px;
padding:20px;
position:relative;
z-index:5;
}

h1{
text-align:center;
color:#00aaff;
text-shadow:0 0 20px #00aaff;
}

input, textarea{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
background:#0a1a2b;
color:white;
font-size:16px;
outline:none;
}

textarea{ height:120px; }

button{
background:#00aaff;
color:black;
border:none;
padding:14px 24px;
border-radius:30px;
font-size:18px;
cursor:pointer;
font-weight:bold;
width:100%;
}

button:hover{
box-shadow:0 0 20px #00aaff;
}

/* COMMENTS */
.comment{
margin-top:15px;
padding:15px;
background:rgba(255,255,255,.05);
border:1px solid rgba(0,170,255,.3);
border-radius:15px;
}

.comment strong{
color:#00aaff;
}

.deleteBtn{
margin-top:10px;
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
opacity:0;
transform:translateY(5px);
transition:0.2s;
}

.comment:hover .deleteBtn{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<canvas id="flameCanvas"></canvas>
<div class="rain" id="rain"></div>

<nav>
<a href="music.html">music</a>
<a href="about.html">About</a>
<a href="chat room.html">chat room</a>
</nav>

<div class="container">

<h1>💙 Chris Legend of Shadows System 💙</h1>

<input id="name" placeholder="Your name">
<textarea id="message" placeholder="Write something positive..."></textarea>
<button id="sendBtn">Post Comment</button>

<div id="comments"></div>

</div>

<script>
/* ===== BLUE RAIN ===== */
const rain = document.getElementById("rain");

for(let i=0;i<60;i++){
  const drop = document.createElement("div");
  drop.classList.add("drop");
  drop.style.left = Math.random()*100 + "vw";
  drop.style.animationDuration = (0.5 + Math.random()*1.5) + "s";
  rain.appendChild(drop);
}

/* ===== STORM CANVAS ===== */
const flameCanvas = document.getElementById("flameCanvas");
const fctx = flameCanvas.getContext("2d");

function resize(){
flameCanvas.width = window.innerWidth;
flameCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

class Flame{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*flameCanvas.width;
this.y = flameCanvas.height + Math.random()*100;
this.size = Math.random()*6 + 2;
this.speedY = Math.random()*2 + 1;
this.speedX = (Math.random()-0.5)*1.5;
this.alpha = Math.random()*0.6 + 0.2;
this.life = Math.random()*120;
}

update(){
this.y -= this.speedY;
this.x += this.speedX;
this.life--;
if(this.life<=0 || this.y<-50) this.reset();
}

draw(){
const g = fctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2);
g.addColorStop(0, `rgba(0,170,255,${this.alpha})`);
g.addColorStop(1,"rgba(0,0,0,0)");

fctx.fillStyle = g;
fctx.beginPath();
fctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
fctx.fill();
}
}

const flames = Array.from({length:120}, ()=>new Flame());

function animate(){
fctx.fillStyle = "rgba(0,0,0,0.12)";
fctx.fillRect(0,0,flameCanvas.width,flameCanvas.height);

flames.forEach(f=>{ f.update(); f.draw(); });

requestAnimationFrame(animate);
}
animate();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAHwNhzonlsFbZFFrc1nvEqpl0ayM8N42c",
authDomain: "bue12-f6a1f.firebaseapp.com",
databaseURL: "https://bue12-f6a1f-default-rtdb.firebaseio.com",
projectId: "bue12-f6a1f",
storageBucket: "bue12-f6a1f.firebasestorage.app",
messagingSenderId: "383513452214",
appId: "1:383513452214:web:a86ee2969a3fc9e3459017"
};

const ADMIN_KEY = "legend123"; // 🔐 CHANGE THIS SECRET

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const commentsRef = ref(db, "comments");

/* POST COMMENT */
document.getElementById("sendBtn").addEventListener("click", async () => {

const name = document.getElementById("name").value.trim();
const message = document.getElementById("message").value.trim();

if (!name || !message) {
alert("Please fill in both fields.");
return;
}

await push(commentsRef, {
name,
message,
time: Date.now()
});

document.getElementById("message").value = "";
});

/* LOAD COMMENTS */
onValue(commentsRef, (snapshot) => {

const data = snapshot.val();
const box = document.getElementById("comments");

box.innerHTML = "";
if (!data) return;

Object.entries(data).reverse().forEach(([id, c]) => {

box.innerHTML += `
<div class="comment">
<strong>${c.name}</strong>
<p>${c.message}</p>

<button class="deleteBtn" onclick="deleteComment('${id}')">
Delete
</button>
</div>
`;
});

});

/* 🔐 SECURE DELETE */
window.deleteComment = async function(id){
const key = prompt("Enter admin key to delete:");

if(key !== ADMIN_KEY){
alert("❌ Not allowed");
return;
}

await remove(ref(db, "comments/" + id));
};
</script>

</body>
</html>
