<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legend Gallery - Vortex Storm Mode</title>

<style>

/* ================= BASE ================= */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background: radial-gradient(circle at center, #02060f, #000);
font-family:Arial,sans-serif;
color:#cfefff;
}

/* ================= CANVAS ================= */
canvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
}

#rainCanvas{ z-index:1; }
#flameCanvas{ z-index:2; }

/* LIGHTNING FLASH */
#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:5;
mix-blend-mode:overlay;
pointer-events:none;
transition:opacity 0.1s;
}

/* CONTENT */
nav, .gallery, .comments-section{
position:relative;
z-index:10;
}

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.5);
backdrop-filter:blur(10px);
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

.gallery{
max-width:1100px;
margin:120px auto 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:14px;
border:1px solid rgba(0,200,255,.25);
}

.comments-section{
max-width:600px;
margin:40px auto;
background:#111f33;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#0b2a44;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:10px;
background:#00c3ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.comment{
margin-top:10px;
padding:10px;
background:#0b2a44;
border-left:3px solid #00c3ff;
}

</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<canvas id="flameCanvas"></canvas>
<div id="flash"></div>

<nav>
<a href="music.html">music</a>
<a href="about.html">About</a>
<a href="chat room.html">chat room</a>
</nav>

<div class="gallery">
<img src="samiam.png">
<img src="tam.png">
</div>

<div class="comments-section">
<h2 style="text-align:center;color:#00c3ff;">💬 Global Comments</h2>

<input id="name" placeholder="Your name">
<textarea id="message" placeholder="Write a comment..."></textarea>
<button onclick="addComment()">Post</button>

<div id="comments"></div>
</div>

<script>

/* ================= CANVAS ================= */
const rainCanvas = document.getElementById("rainCanvas");
const rctx = rainCanvas.getContext("2d");

const flameCanvas = document.getElementById("flameCanvas");
const fctx = flameCanvas.getContext("2d");

const flash = document.getElementById("flash");

/* resize */
function resize(){
rainCanvas.width = window.innerWidth;
rainCanvas.height = window.innerHeight;
flameCanvas.width = window.innerWidth;
flameCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ================= THUNDER SOUND ================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function thunder(){
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type = "sawtooth";
osc.frequency.value = 60;

gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + 1.2);
}

/* ================= LIGHTNING ================= */
function lightning(){
flash.style.opacity = "1";
setTimeout(()=> flash.style.opacity = "0.3", 100);
setTimeout(()=> flash.style.opacity = "0", 200);

thunder();
}

function lightningLoop(){
setTimeout(()=>{
lightning();
lightningLoop();
}, 2000 + Math.random()*5000);
}
lightningLoop();

/* ================= WIND ================= */
let wind = -2;
setInterval(()=> wind = -5 + Math.random()*10, 2500);

/* ================= VORTEX CENTER ================= */
let cx = window.innerWidth/2;
let cy = window.innerHeight/2;

/* ================= RAIN ================= */
class Rain{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*rainCanvas.width;
this.y = Math.random()*rainCanvas.height;
this.len = 30 + Math.random()*40;
this.speed = 12 + Math.random()*10;
}

update(){

/* vortex pull */
let dx = cx - this.x;
let dy = cy - this.y;
let dist = Math.sqrt(dx*dx + dy*dy);

this.x += wind + (dx/dist)*0.5;
this.y += this.speed + (dy/dist)*0.2;

/* reset */
if(this.y > rainCanvas.height || this.x < -50 || this.x > rainCanvas.width+50){
this.x = Math.random()*rainCanvas.width;
this.y = -20;
}
}

draw(){
rctx.strokeStyle = "rgba(0,220,255,1)";
rctx.lineWidth = 2.2;

rctx.shadowBlur = 20;
rctx.shadowColor = "rgba(0,220,255,0.9)";

rctx.beginPath();
rctx.moveTo(this.x,this.y);
rctx.lineTo(this.x + wind*3, this.y + this.len);
rctx.stroke();

rctx.shadowBlur = 0;
}
}

/* ================= ENERGY PARTICLES ================= */
class Flame{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*flameCanvas.width;
this.y = Math.random()*flameCanvas.height;
this.size = Math.random()*6 + 2;
this.speedY = Math.random()*2 + 1;
this.speedX = (Math.random()-0.5)*2;
this.life = Math.random()*140;
this.alpha = Math.random()*0.7 + 0.2;
}

update(){

let dx = cx - this.x;
let dy = cy - this.y;
let dist = Math.sqrt(dx*dx + dy*dy);

this.x += this.speedX + (dx/dist)*0.4;
this.y += this.speedY + (dy/dist)*0.2;

this.life--;
if(this.life<=0) this.reset();
}

draw(){
const g = fctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2);
g.addColorStop(0, `rgba(0,200,255,${this.alpha})`);
g.addColorStop(1,"rgba(0,0,0,0)");

fctx.fillStyle = g;
fctx.beginPath();
fctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
fctx.fill();
}
}

const rain = Array.from({length:400}, ()=>new Rain());
const flames = Array.from({length:160}, ()=>new Flame());

/* ================= ANIMATE ================= */
function animate(){

rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);

/* fog layer */
fctx.fillStyle = "rgba(0,0,0,0.12)";
fctx.fillRect(0,0,flameCanvas.width,flameCanvas.height);

rain.forEach(r=>{ r.update(); r.draw(); });
flames.forEach(f=>{ f.update(); f.draw(); });

requestAnimationFrame(animate);
}
animate();

/* ================= COMMENTS ================= */
window.addComment = function(){
const name = document.getElementById("name").value;
const message = document.getElementById("message").value;
if(!name || !message) return;

const div = document.createElement("div");
div.className = "comment";
div.innerHTML = `<b>${name}</b><br>${message}`;
document.getElementById("comments").prepend(div);

document.getElementById("message").value = "";
};

</script>

</body>
</html>
