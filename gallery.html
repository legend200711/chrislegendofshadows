<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legend Gallery + Storm Mode</title>

<style>

/* ================= BASE ================= */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow-x:hidden;
font-family:Arial,sans-serif;
color:#cfefff;
}

body{
position:relative;
}

/* ================= CANVAS (FIXED STACKING) ================= */
#rainCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:1;
pointer-events:none;
}

#flameCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:2;
pointer-events:none;
}

/* CONTENT ABOVE EVERYTHING */
nav, .gallery, .comments-section{
position:relative;
z-index:10;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:14px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
}

nav a{
color:#7fd3ff;
text-decoration:none;
font-weight:bold;
}

/* ================= GALLERY ================= */
.gallery{
max-width:1100px;
margin:120px auto 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:14px;
border:1px solid rgba(0,200,255,.25);
}

/* ================= COMMENTS ================= */
.comments-section{
max-width:600px;
margin:40px auto;
background:#111f33;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#0b2a44;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:10px;
background:#00c3ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.comment{
margin-top:10px;
padding:10px;
background:#0b2a44;
border-left:3px solid #00c3ff;
}

</style>
</head>

<body>

<!-- CANVAS MUST BE FIRST -->
<canvas id="rainCanvas"></canvas>
<canvas id="flameCanvas"></canvas>

<!-- NAV -->
<nav>
<a href="music.html">music</a>
<a href="about.html">About</a>
<a href="chat room.html">chat room</a>
</nav>

<!-- GALLERY -->
<div class="gallery">
<img src="samiam.png">
<img src="tam.png">
</div>

<!-- COMMENTS -->
<div class="comments-section">
<h2 style="text-align:center;color:#00c3ff;">💬 Global Comments</h2>

<input id="name" placeholder="Your name">
<textarea id="message" placeholder="Write a comment..."></textarea>
<button onclick="addComment()">Post</button>

<div id="comments"></div>
</div>

<script>
/* ================= CANVAS SETUP ================= */
const rainCanvas = document.getElementById("rainCanvas");
const rctx = rainCanvas.getContext("2d");

const flameCanvas = document.getElementById("flameCanvas");
const fctx = flameCanvas.getContext("2d");

function resize(){
rainCanvas.width = window.innerWidth;
rainCanvas.height = window.innerHeight;
flameCanvas.width = window.innerWidth;
flameCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ================= STORM RAIN (VISIBLE GUARANTEE) ================= */
class Rain{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*rainCanvas.width;
this.y = Math.random()*rainCanvas.height;
this.len = 15 + Math.random()*25;
this.speed = 8 + Math.random()*8;
this.wind = -3 - Math.random()*3;
}

update(){
this.x += this.wind;
this.y += this.speed;

if(this.y > rainCanvas.height){
this.x = Math.random()*rainCanvas.width;
this.y = -20;
}
}

draw(){
rctx.strokeStyle = "rgba(0,200,255,0.9)";
rctx.lineWidth = 1.5;
rctx.beginPath();
rctx.moveTo(this.x,this.y);
rctx.lineTo(this.x + this.wind*2, this.y + this.len);
rctx.stroke();
}
}

/* ================= FLAMES ================= */
class Flame{
constructor(){ this.reset(); }

reset(){
this.x = Math.random()*flameCanvas.width;
this.y = flameCanvas.height + Math.random()*100;
this.size = Math.random()*6 + 2;
this.speedY = Math.random()*2 + 1;
this.speedX = (Math.random()-0.5)*1.5;
this.alpha = Math.random()*0.6 + 0.2;
this.life = Math.random()*120;
}

update(){
this.y -= this.speedY;
this.x += this.speedX;
this.life--;
if(this.life<=0 || this.y<-50) this.reset();
}

draw(){
const g = fctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2);
g.addColorStop(0, `rgba(0,180,255,${this.alpha})`);
g.addColorStop(1,"rgba(0,0,0,0)");

fctx.fillStyle = g;
fctx.beginPath();
fctx.arc(this.x,this.y,this.size*2,0,Math.PI*2);
fctx.fill();
}
}

const rain = Array.from({length:250}, ()=>new Rain());
const flames = Array.from({length:120}, ()=>new Flame());

/* ================= ANIMATE ================= */
function animate(){

rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
fctx.fillStyle = "rgba(0,0,0,0.15)";
fctx.fillRect(0,0,flameCanvas.width,flameCanvas.height);

rain.forEach(r=>{ r.update(); r.draw(); });
flames.forEach(f=>{ f.update(); f.draw(); });

requestAnimationFrame(animate);
}
animate();

/* ================= SIMPLE COMMENTS ================= */
window.addComment = function(){
const name = document.getElementById("name").value;
const message = document.getElementById("message").value;
if(!name || !message) return;

const div = document.createElement("div");
div.className = "comment";
div.innerHTML = `<b>${name}</b><br>${message}`;

document.getElementById("comments").prepend(div);

document.getElementById("message").value = "";
};
</script>

</body>
</html>
