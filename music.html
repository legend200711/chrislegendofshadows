<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Legend Music Hub</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
color:#cfefff;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* CINEMATIC BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.35),transparent 45%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.25),transparent 50%);
animation:glow 4s infinite alternate;
z-index:-20;
}

@keyframes glow{
0%{filter:brightness(1)}
100%{filter:brightness(1.7)}
}

header{
text-align:center;
padding:60px 20px 10px;
}

h1{
font-size:52px;
text-shadow:0 0 25px #00c8ff;
}

.box{
max-width:900px;
margin:25px auto;
padding:20px;
background:rgba(0,0,0,.7);
border:1px solid #00c8ff;
border-radius:14px;
box-shadow:0 0 25px rgba(0,200,255,.2);
backdrop-filter:blur(10px);
transition:0.3s ease;
}

.box:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 25px 60px rgba(0,0,0,.8),0 0 30px #00c8ff;
}

nav{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

nav a{
color:#00c8ff;
text-decoration:none;
padding:10px 16px;
border-radius:12px;
border:1px solid rgba(0,200,255,.4);
background:rgba(0,0,0,.5);
transition:0.3s;
}

nav a:hover{
transform:translateY(-6px) scale(1.08);
box-shadow:0 0 25px #00c8ff;
background:rgba(0,200,255,.15);
color:#fff;
}

/* CANVAS */
#rainCanvas,#fireCanvas,#vortexCanvas,#lightningCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#rainCanvas{z-index:-10;}
#fireCanvas{z-index:-9;}
#vortexCanvas{z-index:-8;}
#lightningCanvas{z-index:-7;}

</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<canvas id="fireCanvas"></canvas>
<canvas id="vortexCanvas"></canvas>
<canvas id="lightningCanvas"></canvas>

<header>
<h1>🎧 LEGEND MUSIC HUB</h1>

<nav>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="chat room.html">chat room</a>
</nav>
</header>

<div class="box">
<h2>🎬 YouTube Music</h2>
<iframe width="100%" height="360"
src="https://www.youtube.com/embed/videoseries?list=UUE_cbs14G_QUfPOvByU1q9w"
allowfullscreen></iframe>
</div>



<div class="box">
<h2>🎧 Spotify Artist</h2>
<iframe width="100%" height="352"
src="https://open.spotify.com/embed/artist/010qnpDsNjUeyIkyV2Fnlr"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<script>

let beat = 0;
setInterval(()=>{ beat = Math.random(); }, 250);

/* RAIN (BLUE NEON RAIN) */
const rain = document.getElementById("rainCanvas");
const rctx = rain.getContext("2d");
rain.width = innerWidth;
rain.height = innerHeight;

let drops=[];
for(let i=0;i<180;i++){
drops.push({
x:Math.random()*rain.width,
y:Math.random()*rain.height,
len:10+Math.random()*15,
speed:4+Math.random()*6
});
}

/* FIRE (BLUE FLAMES) */
const fire = document.getElementById("fireCanvas");
const fctx = fire.getContext("2d");
fire.width = innerWidth;
fire.height = innerHeight;

let flames=[];
for(let i=0;i<80;i++){
flames.push({
x:Math.random()*fire.width,
y:fire.height+Math.random()*200
});
}

/* ANIMATE RAIN */
function drawRain(){
rctx.clearRect(0,0,rain.width,rain.height);

for(let d of drops){

let speed = d.speed + beat*5;

rctx.strokeStyle="rgba(0,200,255,0.9)";
rctx.shadowBlur = 10;
rctx.shadowColor = "#00c8ff";

rctx.beginPath();
rctx.moveTo(d.x,d.y);
rctx.lineTo(d.x, d.y + d.len);
rctx.stroke();

d.y += speed;
d.x += -1 + beat*2;

if(d.y > rain.height){
d.y = 0;
d.x = Math.random()*rain.width;
}
}

requestAnimationFrame(drawRain);
}

/* ANIMATE BLUE FIRE */
function drawFire(){
fctx.clearRect(0,0,fire.width,fire.height);

for(let f of flames){

let glow = 0.3 + beat;

let g = fctx.createRadialGradient(f.x,f.y,2,f.x,f.y,40);
g.addColorStop(0,`rgba(0,200,255,${glow})`);
g.addColorStop(0.5,"rgba(0,120,255,0.2)");
g.addColorStop(1,"transparent");

fctx.shadowBlur = 25;
fctx.shadowColor = "#00c8ff";
fctx.fillStyle = g;

fctx.beginPath();
fctx.arc(f.x,f.y,35,0,Math.PI*2);
fctx.fill();

f.y -= 2 + beat*6;

if(f.y < -50){
f.y = fire.height + 50;
f.x = Math.random()*fire.width;
}
}

requestAnimationFrame(drawFire);
}

/* START */
drawRain();
drawFire();

</script>

</body>
</html>
