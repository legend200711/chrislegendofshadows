<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Legend Music Hub</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
color:#cfefff;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* CINEMATIC BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.35),transparent 45%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.25),transparent 50%);
animation:glow 4s infinite alternate;
z-index:-20;
}

@keyframes glow{
0%{filter:brightness(1)}
100%{filter:brightness(1.7)}
}

/* HEADER */
header{
text-align:center;
padding:60px 20px 10px;
}

h1{
font-size:52px;
text-shadow:0 0 25px #00c8ff;
}

/* BOX */
.box{
max-width:900px;
margin:25px auto;
padding:20px;
background:rgba(0,0,0,.7);
border:1px solid #00c8ff;
border-radius:14px;
box-shadow:0 0 25px rgba(0,200,255,.2);
backdrop-filter:blur(10px);
transition:0.3s ease;
}

.box:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 25px 60px rgba(0,0,0,.8),0 0 30px #00c8ff;
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

nav a.link{
color:#00c8ff;
text-decoration:none;
padding:10px 16px;
border-radius:12px;
border:1px solid rgba(0,200,255,.4);
background:rgba(0,0,0,.5);
transition:0.3s;
}

nav a.link:hover{
transform:translateY(-6px) scale(1.08);
box-shadow:0 0 25px #00c8ff;
background:rgba(0,200,255,.15);
color:#fff;
}

/* CANVAS LAYERS */
#rainCanvas,#fireCanvas,#lightningCanvas,#vortexCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#rainCanvas{z-index:-10;}
#fireCanvas{z-index:-9;}
#vortexCanvas{z-index:-8;}
#lightningCanvas{z-index:-7;}

</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<canvas id="fireCanvas"></canvas>
<canvas id="vortexCanvas"></canvas>
<canvas id="lightningCanvas"></canvas>

<header>
<h1>🎧 LEGEND MUSIC HUB</h1>
</header>

<!-- BOXES -->
<div class="box">
<h2>🎬 YouTube Music</h2>
<iframe width="100%" height="360"
src="https://www.youtube.com/embed/videoseries?list=UUE_cbs14G_QUfPOvByU1q9w"
allowfullscreen></iframe>
</div>

<div class="box">
<h2>🎧 Spotify Artist</h2>
<iframe width="100%" height="352"
src="https://open.spotify.com/embed/artist/010qnpDsNjUeyIkyV2Fnlr"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<script>

/* ===================== BEAT SYSTEM ===================== */
let beat = 0;
setInterval(()=>{ beat = Math.random(); }, 400);

/* ===================== SCREEN SHAKE ===================== */
let shakeTime = 0;
let shakePower = 0;

function screenShake(power=12,time=250){
shakePower = power;
shakeTime = time;
}

/* ===================== RAIN ===================== */
const rain = document.getElementById("rainCanvas");
const rctx = rain.getContext("2d");
rain.width = innerWidth;
rain.height = innerHeight;

let wind = 0;
let gust = 0;

let drops=[];
for(let i=0;i<150;i++){
drops.push({
x:Math.random()*rain.width,
y:Math.random()*rain.height,
len:8+Math.random()*10,
speed:4+Math.random()*4
});
}

/* ===================== FIRE ===================== */
const fire = document.getElementById("fireCanvas");
const fctx = fire.getContext("2d");
fire.width = innerWidth;
fire.height = innerHeight;

let flames=[];
for(let i=0;i<60;i++){
flames.push({
x:Math.random()*fire.width,
y:fire.height+Math.random()*200
});
}

/* ===================== VORTEX ===================== */
const vortex = document.getElementById("vortexCanvas");
const vctx = vortex.getContext("2d");
vortex.width = innerWidth;
vortex.height = innerHeight;

let angle = 0;

/* ===================== LIGHTNING ===================== */
const lightning = document.getElementById("lightningCanvas");
const lctx = lightning.getContext("2d");
lightning.width = innerWidth;
lightning.height = innerHeight;

let flashAlpha = 0;
let lightningBolt = null;

function flash(){
flashAlpha = 0.6;
screenShake(12,250);
}

/* ===================== GUST ===================== */
function triggerGust(){
gust = (Math.random()*7 - 3.5);

flash();

lightningBolt = {
x: Math.random()*lightning.width,
y: 0,
segments:[]
};

let x = lightningBolt.x;
let y = 0;

for(let i=0;i<12;i++){
x += (Math.random()-0.5)*80;
y += 60 + Math.random()*40;
lightningBolt.segments.push({x,y});
}
}

setInterval(()=>{
if(Math.random()<0.5) triggerGust();
},2200);

/* ===================== WIND ===================== */
function updateWind(){
wind += (Math.random()-0.5)*0.12;
wind *= 0.98;
wind = Math.max(-3,Math.min(3,wind));
}

/* ===================== DRAW RAIN ===================== */
function drawRain(){
rctx.clearRect(0,0,rain.width,rain.height);

updateWind();
let totalWind = wind + gust;

for(let d of drops){

let spd = 4 + Math.random()*4 + beat*6;

rctx.strokeStyle="rgba(0,180,255,0.6)";
rctx.beginPath();
rctx.moveTo(d.x,d.y);
rctx.lineTo(d.x + totalWind*2, d.y + d.len);
rctx.stroke();

d.y += spd;
d.x += totalWind;

if(d.y > rain.height){
d.y = 0;
d.x = Math.random()*rain.width;
}
}

gust *= 0.92;
requestAnimationFrame(drawRain);
}

/* ===================== DRAW FIRE ===================== */
function drawFire(){
fctx.clearRect(0,0,fire.width,fire.height);

for(let f of flames){

let g = fctx.createRadialGradient(f.x,f.y,2,f.x,f.y,30);
g.addColorStop(0,`rgba(0,200,255,${0.4 + beat})`);
g.addColorStop(1,"transparent");

fctx.fillStyle=g;
fctx.beginPath();
fctx.arc(f.x,f.y,30,0,Math.PI*2);
fctx.fill();

f.y -= 2.5 + beat*4;

if(f.y < -50){
f.y = fire.height + 50;
f.x = Math.random()*fire.width;
}
}

requestAnimationFrame(drawFire);
}

/* ===================== DRAW VORTEX ===================== */
function drawVortex(){
vctx.clearRect(0,0,vortex.width,vortex.height);

const cx = vortex.width/2;
const cy = vortex.height/2;

angle += 0.02 + beat*0.02;

for(let i=0;i<140;i++){
let a = angle + i*0.12;
let r = i*3;

let x = cx + Math.cos(a)*r;
let y = cy + Math.sin(a)*r;

vctx.fillStyle = `rgba(0,200,255,${1 - i/140})`;
vctx.beginPath();
vctx.arc(x,y,2,0,Math.PI*2);
vctx.fill();
}

requestAnimationFrame(drawVortex);
}

/* ===================== DRAW LIGHTNING ===================== */
function drawLightning(){
lctx.clearRect(0,0,lightning.width,lightning.height);

/* flash */
if(flashAlpha > 0){
lctx.fillStyle = `rgba(0,200,255,${flashAlpha})`;
lctx.fillRect(0,0,lightning.width,lightning.height);
flashAlpha *= 0.85;
}

/* bolt */
if(lightningBolt){
lctx.strokeStyle="rgba(0,220,255,0.9)";
lctx.lineWidth=2;
lctx.beginPath();
lctx.moveTo(lightningBolt.x,0);

for(let p of lightningBolt.segments){
lctx.lineTo(p.x,p.y);
}

lctx.stroke();

if(Math.random()<0.1){
lightningBolt = null;
}
}

/* SCREEN SHAKE APPLY */
if(shakeTime > 0){
shakeTime -= 16;

let x = (Math.random()-0.5)*shakePower;
let y = (Math.random()-0.5)*shakePower;

document.body.style.transform = `translate(${x}px,${y}px)`;
}else{
document.body.style.transform = "translate(0,0)";
}

requestAnimationFrame(drawLightning);
}

/* ===================== START ===================== */
drawRain();
drawFire();
drawVortex();
drawLightning();

</script>

</body>
</html>
