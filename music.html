<audio id="player" controls></audio>

<script>
const songs = [
"music/Afraid of the Dark Place.mp3"
];

let current = 0;

const player = document.getElementById("player");
const nowPlaying = document.getElementById("nowPlaying");
const volume = document.getElementById("volume");
const progress = document.getElementById("progress");

/* FORCE AUDIO SETTINGS */
player.volume = 1;
player.muted = false;

/* LOAD SONG */
function loadSong(i){

player.src = songs[i];

player.load();

nowPlaying.textContent =
"Now Playing: " + songs[i].split("/").pop();

player.play()
.then(()=>{
console.log("Song playing");
})
.catch(err=>{
console.error("Play Error:", err);
alert("Audio failed to play. Check browser console (F12).");
});
}

/* CONTROLS */
function playMusic(){

if(!player.src){
loadSong(current);
}else{
player.play();
}

document.body.classList.add("shake");
}

function pauseMusic(){
player.pause();
document.body.classList.remove("shake");
}

function stopMusic(){
player.pause();
player.currentTime = 0;
document.body.classList.remove("shake");
}

function nextSong(){
current++;
if(current >= songs.length) current = 0;
loadSong(current);
}

/* VOLUME */
volume.addEventListener("input",()=>{
player.volume = volume.value;
player.muted = false;
});

/* PROGRESS BAR */
player.addEventListener("timeupdate",()=>{

if(player.duration){

progress.value =
(player.currentTime / player.duration) * 100;

}

});

progress.addEventListener("input",()=>{

if(player.duration){

player.currentTime =
(progress.value / 100) * player.duration;

}

});

/* AUTO NEXT */
player.addEventListener("ended",nextSong);

/* DEBUG */
player.addEventListener("loadeddata",()=>{
console.log("Audio Loaded");
});

player.addEventListener("play",()=>{
console.log("Playing");
console.log("Volume:",player.volume);
console.log("Muted:",player.muted);
});

player.addEventListener("error",()=>{

console.log("Audio Error");

console.log(player.error);

alert("Audio Error. Press F12 and check Console.");

});
</script>
