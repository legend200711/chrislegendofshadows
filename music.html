<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Legend Music Hub</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
color:#cfefff;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* ===== CINEMATIC BACKGROUND ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.35),transparent 45%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.25),transparent 50%);
animation:glow 4s infinite alternate;
z-index:-10;
}

@keyframes glow{
0%{filter:brightness(1)}
100%{filter:brightness(1.7)}
}

/* ===== HEADER ===== */
header{
text-align:center;
padding:60px 20px 10px;
}

h1{
font-size:52px;
text-shadow:0 0 25px #00c8ff;
}

/* ===== BOX ===== */
.box{
max-width:900px;
margin:25px auto;
padding:20px;
background:rgba(0,0,0,.7);
border:1px solid #00c8ff;
border-radius:14px;
box-shadow:0 0 25px rgba(0,200,255,.2);
backdrop-filter:blur(10px);
transition:0.3s ease;
}

.box:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 25px 60px rgba(0,0,0,.8),0 0 30px #00c8ff;
}

/* ===== BUTTON ===== */
button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#00c8ff;
color:#000;
font-weight:bold;
cursor:pointer;
margin:5px;
}

button:hover{
background:#00e5ff;
transform:scale(1.05);
}

/* ===== NAV ===== */
nav{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

nav a.link{
color:#00c8ff;
text-decoration:none;
padding:10px 16px;
border-radius:12px;
border:1px solid rgba(0,200,255,.4);
background:rgba(0,0,0,.5);
transition:0.3s;
}

nav a.link:hover{
transform:translateY(-6px) scale(1.08);
box-shadow:0 0 25px #00c8ff;
background:rgba(0,200,255,.15);
color:#fff;
}

/* ===== RAIN + FIRE ===== */
#rainCanvas,#fireCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#rainCanvas{z-index:-5;}
#fireCanvas{z-index:-6;}

/* ===== POP EFFECT ===== */
.popBurst{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
background:#00c8ff;
box-shadow:0 0 20px #00c8ff, 0 0 40px #0077ff;
pointer-events:none;
z-index:9999;
animation:popAnim 0.8s ease-out forwards;
}

@keyframes popAnim{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(12);opacity:0;}
}

h2{
text-shadow:0 0 15px #00c8ff;
}
</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<canvas id="fireCanvas"></canvas>

<header>
<h1>🎧 LEGEND MUSIC HUB</h1>

<nav>
<a href="about.html" class="link">about</a>
<a href="gallery.html" class="link">Gallery</a>
</nav>
</header>

<!-- ===== ONE SONG PLAYER (ADDED) ===== -->
<div class="box">
<h2>🎵 Afraid of the Dark Place</h2>

<button onclick="playSong()">▶ Play</button>
<button onclick="pauseSong()">⏸ Pause</button>

</div>

<!-- YOUTUBE -->
<div class="box">
<h2>🎬 YouTube Music</h2>
<iframe width="100%" height="360"
src="https://www.youtube.com/embed/videoseries?list=UUE_cbs14G_QUfPOvByU1q9w"
allowfullscreen></iframe>
</div>

<!-- SPOTIFY -->
<div class="box">
<h2>🎧 Spotify Artist</h2>
<iframe width="100%" height="352"
src="https://open.spotify.com/embed/artist/010qnpDsNjUeyIkyV2Fnlr"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<script>

/* ===== ONE SONG AUDIO ===== */
let audio = new Audio("./music/afraid of the dark place.mp3");

function playSong(){
audio.play().catch(err=>{
console.log(err);
alert("Song not found. Check file path or name.");
});
}

function pauseSong(){
audio.pause();
}

/* ===== POP EFFECT ===== */
function createPop(x,y){
const p=document.createElement("div");
p.className="popBurst";
p.style.left=x+"px";
p.style.top=y+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),800);
}

/* OPTIONAL AMBIENT POPS */
setInterval(()=>{
createPop(
Math.random()*window.innerWidth,
Math.random()*window.innerHeight
);
}, 3000);

/* ===== RAIN ===== */
const rain = document.getElementById("rainCanvas");
const rctx = rain.getContext("2d");
rain.width = innerWidth;
rain.height = innerHeight;

let drops=[];
for(let i=0;i<120;i++){
drops.push({x:Math.random()*rain.width,y:Math.random()*rain.height});
}

function drawRain(){
rctx.clearRect(0,0,rain.width,rain.height);
rctx.strokeStyle="rgba(0,180,255,0.6)";
for(let d of drops){
rctx.beginPath();
rctx.moveTo(d.x,d.y);
rctx.lineTo(d.x+2,d.y+12);
rctx.stroke();
d.y+=8;
if(d.y>rain.height){d.y=0;d.x=Math.random()*rain.width;}
}
requestAnimationFrame(drawRain);
}
drawRain();

/* ===== FIRE ===== */
const fire = document.getElementById("fireCanvas");
const fctx = fire.getContext("2d");
fire.width = innerWidth;
fire.height = innerHeight;

let flames=[];
for(let i=0;i<60;i++){
flames.push({x:Math.random()*fire.width,y:fire.height+Math.random()*200});
}

function drawFire(){
fctx.clearRect(0,0,fire.width,fire.height);

for(let f of flames){
let g=fctx.createRadialGradient(f.x,f.y,2,f.x,f.y,30);
g.addColorStop(0,"rgba(0,200,255,0.8)");
g.addColorStop(1,"transparent");

fctx.fillStyle=g;
fctx.beginPath();
fctx.arc(f.x,f.y,30,0,Math.PI*2);
fctx.fill();

f.y-=2.5;
if(f.y<-50){
f.y=fire.height+50;
f.x=Math.random()*fire.width;
}
}

requestAnimationFrame(drawFire);
}
drawFire();

</script>

</body>
</html>
