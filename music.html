<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Legend Music Hub</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
color:#cfefff;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* ===== CINEMATIC BACKGROUND ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.35),transparent 45%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.25),transparent 50%);
animation:glow 4s infinite alternate;
z-index:-10;
}

@keyframes glow{
0%{filter:brightness(1)}
100%{filter:brightness(1.7)}
}

/* ===== HEADER ===== */
header{
text-align:center;
padding:60px 20px 10px;
}

h1{
font-size:52px;
text-shadow:0 0 25px #00c8ff;
}

/* ===== BOX ===== */
.box{
max-width:900px;
margin:25px auto;
padding:20px;
background:rgba(0,0,0,.7);
border:1px solid #00c8ff;
border-radius:14px;
box-shadow:0 0 25px rgba(0,200,255,.2);
backdrop-filter:blur(10px);
transition:0.3s ease;
}

.box:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 25px 60px rgba(0,0,0,.8),0 0 30px #00c8ff;
}

/* ===== BUTTON ===== */
button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#00c8ff;
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e5ff;
transform:scale(1.05);
}

input[type=range]{
width:100%;
accent-color:#00c8ff;
}

/* ===== NAV ===== */
nav{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

nav a.link{
color:#00c8ff;
text-decoration:none;
padding:10px 16px;
border-radius:12px;
border:1px solid rgba(0,200,255,.4);
background:rgba(0,0,0,.5);
transition:0.3s;
}

nav a.link:hover{
transform:translateY(-6px) scale(1.08);
box-shadow:0 0 25px #00c8ff;
background:rgba(0,200,255,.15);
color:#fff;
}

/* ===== RAIN + FIRE ===== */
#rainCanvas,#fireCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#rainCanvas{z-index:-5;}
#fireCanvas{z-index:-6;}

/* ===== SHAKE ===== */
.shake{
animation:shake 0.2s infinite;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(1px,-1px);}
50%{transform:translate(-1px,1px);}
75%{transform:translate(1px,1px);}
100%{transform:translate(0,0);}
}

/* ===== POP EFFECT ===== */
.popBurst{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
background:#00c8ff;
box-shadow:0 0 20px #00c8ff, 0 0 40px #0077ff;
pointer-events:none;
z-index:9999;
animation:popAnim 0.8s ease-out forwards;
}

@keyframes popAnim{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(12);opacity:0;}
}

h2{
text-shadow:0 0 15px #00c8ff;
}
</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<canvas id="fireCanvas"></canvas>

<header>
<h1>🎧 LEGEND MUSIC HUB</h1>

<nav>
<a href="about.html" class="link">about</a>
<a href="gallery.html" class="link">Gallery</a>
</nav>
</header>

<!-- DJ PLAYER -->
<div class="box">
<h2>🔥 Local DJ System</h2>

<h3 id="nowPlaying">Now Playing: None</h3>

<audio id="player"></audio>

<label>Volume</label>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">

<input type="range" id="progress" value="0">

<div>
<button onclick="playMusic()">▶ Play</button>
<button onclick="pauseMusic()">⏸ Pause</button>
<button onclick="stopMusic()">⏹ Stop</button>
<button onclick="nextSong()">⏭ Skip</button>
</div>
</div>

<script>

/* ===== MUSIC SYSTEM (FIXED FOR GITHUB) ===== */

const songs = [
"./music/afraid-of-the-dark-place.mp3"
];

let current = 0;

const player = document.getElementById("player");
const nowPlaying = document.getElementById("nowPlaying");
const volume = document.getElementById("volume");
const progress = document.getElementById("progress");

function loadSong(i){

player.src = songs[i];
player.load();

nowPlaying.textContent =
"Now Playing: afraid-of-the-dark-place.mp3";

player.play().catch(err=>{
console.log("Audio error:", err);
});

}

function playMusic(){
if(!player.src) loadSong(current);
else player.play();

document.body.classList.add("shake");
}

function pauseMusic(){
player.pause();
document.body.classList.remove("shake");
}

function stopMusic(){
player.pause();
player.currentTime = 0;
document.body.classList.remove("shake");
}

function nextSong(){
current++;
if(current >= songs.length) current = 0;
loadSong(current);
}

volume.oninput = ()=>{
player.volume = volume.value;
};

player.ontimeupdate = ()=>{
progress.value =
(player.currentTime / player.duration) * 100 || 0;
};

progress.oninput = ()=>{
player.currentTime =
(progress.value / 100) * player.duration;
};

player.onended = nextSong;

</script>

</body>
</html>
